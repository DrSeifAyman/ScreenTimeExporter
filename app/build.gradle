plugins {
    id 'com.android.application'
}

android {
    namespace 'com.seif.screentimeexporter'
    compileSdk 34

    defaultConfig {
        applicationId 'com.seif.screentimeexporter'
        minSdk 23
        targetSdk 34
        versionCode 2
        versionName '2.0.0'
    }

    signingConfigs {
        release {
            storeFile file("${projectDir}/screentime-release.jks")
            storePassword 'screentime2026'
            keyAlias 'screentime'
            keyPassword 'screentime2026'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            // removed suffix to overwrite old app
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'com.google.android.gms:play-services-auth:21.2.0'
}

configurations.all {
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}
