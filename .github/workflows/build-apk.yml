name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable & fix CRLF
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace > build.log 2>&1 || (cat build.log && echo "Build Failed!" && exit 1)

      - name: Commit build log
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add build.log app/build/reports/errors/ || true
          git commit -m "Upload build log for debugging" || true
          git pull --rebase || true
          git push

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenTimeExporter-APK
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
